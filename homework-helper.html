<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework Helper | होमवर्क हेल्पर</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%93%9A%3C/text%3E%3C/svg%3E">

    <!-- Google Fonts: Black Han Sans (타이틀용), Noto Sans (본문용) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans:wght@400;500;700;800&family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        primaryLight: '#93C5FD',
                        primaryDark: '#2563EB',
                        accent: '#FBBF24',
                        success: '#10B981',
                        bgLight: '#EFF6FF',
                    },
                    fontFamily: {
                        title: ['"Black Han Sans"', '"Noto Sans Devanagari"', 'sans-serif'],
                        body: ['"Noto Sans"', '"Noto Sans Devanagari"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        #app-container {
            width: 100%;
            min-height: 100vh;
            background-color: #EFF6FF;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        ::-webkit-scrollbar { display: none; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-animation { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        .hidden-screen { display: none !important; }

        /* 모바일: 전체 화면 / 데스크톱: 폰 크기 중앙 프레임 */
        #app-container { max-width: 480px; margin: 0 auto; }
        @media (min-width: 540px) {
            #app-container {
                min-height: calc(100vh - 48px);
                border-radius: 32px;
                box-shadow: 0 24px 70px rgba(0, 40, 90, 0.18);
            }
        }
    </style>
</head>
<body class="font-body text-gray-800">

    <!-- 앱 컨테이너 -->
    <main id="app-container" aria-label="Homework Helper app">

        <!-- 상단 타이틀바 + 언어 선택 -->
        <header class="bg-primary text-white p-4 pt-8 rounded-b-3xl shadow-md z-10 shrink-0">
            <div class="flex justify-end gap-2 mb-2">
                <button onclick="changeLanguage('ko')" data-lang="ko" class="lang-btn bg-white/90 px-3 py-1.5 min-w-[44px] rounded-full shadow text-sm font-bold text-gray-400" aria-label="Korean">KR</button>
                <button onclick="changeLanguage('en')" data-lang="en" class="lang-btn bg-white/90 px-3 py-1.5 min-w-[44px] rounded-full shadow text-sm font-bold text-gray-400" aria-label="English">EN</button>
                <button onclick="changeLanguage('hi')" data-lang="hi" class="lang-btn bg-white/90 px-3 py-1.5 min-w-[44px] rounded-full shadow text-sm font-bold text-primary" aria-label="Hindi">HI</button>
            </div>
            <h1 id="t-main-title" class="font-title text-3xl tracking-wide text-center">📚 होमवर्क हेल्पर</h1>
            <p id="t-app-desc" class="text-center text-sm font-bold text-white/90 mt-1">होमवर्क कभी मत भूलना!</p>
        </header>

        <!-- 메인: 오늘의 숙제 체크리스트 (한 화면에 모두 표시) -->
        <div class="flex-1 overflow-y-auto p-5">

            <!-- 진행 상태 -->
            <div class="bg-white rounded-3xl shadow-sm border-2 border-blue-100 p-5 mb-5 text-center">
                <p id="t-greeting" class="text-lg font-bold text-primaryDark mb-3">नमस्ते! आज का होमवर्क पूरा करें 🌟</p>
                <div class="w-full bg-blue-100 rounded-full h-5 overflow-hidden">
                    <div id="progress-bar" class="bg-success h-5 rounded-full transition-all duration-500" style="width:0%"></div>
                </div>
                <p id="progress-text" class="text-primaryDark font-title text-2xl mt-2">0 / 0</p>
            </div>

            <!-- 체크리스트 -->
            <ul id="hw-list" class="space-y-3 mb-5">
                <!-- 항목이 동적으로 렌더링됩니다 -->
            </ul>

            <!-- 모두 완료 시 축하 도장 -->
            <div id="celebrate" class="hidden-screen bg-success/10 border-2 border-success rounded-3xl p-6 text-center mb-5">
                <div class="pop-animation text-6xl mb-2">🎉</div>
                <p id="t-celebrate" class="font-title text-2xl text-success">शाबाश! सारा होमवर्क हो गया!</p>
            </div>

            <!-- 새로 시작 (다음 날) -->
            <button onclick="resetToday()" id="t-btn-reset" class="w-full border-2 border-primary text-primary py-3 rounded-2xl font-bold hover:bg-blue-50 transition">
                🔄 नया दिन शुरू करें
            </button>
        </div>

    </main>

    <!-- 앱 로직 및 다국어 지원 스크립트 -->
    <script>
        // --- 1. 다국어 (i18n) 데이터 ---
        const translations = {
            ko: {
                appTitle: "📚 숙제챙겨",
                appDesc: "숙제 잊지 않게 도와줄게!",
                mainTitle: "📚 숙제챙겨",
                greeting: "안녕! 오늘 숙제를 하나씩 눌러 확인해요 🌟",
                celebrate: "잘했어! 오늘 숙제 끝! 🎉",
                btnReset: "🔄 새 하루 시작하기",
                hw_math: "수학 문제 풀기",
                hw_language: "국어/언어 읽고 쓰기",
                hw_reading: "책 읽기",
                hw_bag: "가방에 준비물 챙기기",
            },
            hi: {
                appTitle: "📚 होमवर्क हेल्पर",
                appDesc: "होमवर्क कभी मत भूलना!",
                mainTitle: "📚 होमवर्क हेल्पर",
                greeting: "नमस्ते! आज का होमवर्क एक-एक करके दबाकर पूरा करें 🌟",
                celebrate: "शाबाश! सारा होमवर्क हो गया! 🎉",
                btnReset: "🔄 नया दिन शुरू करें",
                hw_math: "गणित के सवाल हल करें",
                hw_language: "भाषा पढ़ें और लिखें",
                hw_reading: "किताब पढ़ें",
                hw_bag: "बैग में सामान रखें",
            },
            en: {
                appTitle: "📚 HW Helper",
                appDesc: "Never forget your homework!",
                mainTitle: "📚 HW Helper",
                greeting: "Hi! Tap each task to finish today's homework 🌟",
                celebrate: "Great job! All homework done! 🎉",
                btnReset: "🔄 Start a new day",
                hw_math: "Solve math problems",
                hw_language: "Read & write language",
                hw_reading: "Read a book",
                hw_bag: "Pack your bag",
            }
        };

        // 오늘의 숙제 항목 (텍스트 입력 없이 미리 정해둔 간단한 목록)
        const HW_ITEMS = [
            { key: 'hw_math', icon: '➕' },
            { key: 'hw_language', icon: '✏️' },
            { key: 'hw_reading', icon: '📖' },
            { key: 'hw_bag', icon: '🎒' },
        ];

        // --- 2. 상태 관리 (허브·다른 앱과 언어 공유) ---
        const LANG_KEY = 'dbfi_lang';
        const SUPPORTED_LANGS = ['ko', 'en', 'hi'];
        function getInitialLang() {
            try {
                const p = new URLSearchParams(location.search).get('lang');
                if (p && SUPPORTED_LANGS.includes(p)) return p;
            } catch (e) { /* 무시 */ }
            try {
                const s = localStorage.getItem(LANG_KEY);
                if (s && SUPPORTED_LANGS.includes(s)) return s;
            } catch (e) { /* 무시 */ }
            return 'hi';
        }

        // 완료 상태 저장/복원 (오늘 체크한 항목이 새로고침 후에도 유지되도록)
        const DONE_KEY = 'homeworkDone';
        function loadDone() {
            try {
                const raw = localStorage.getItem(DONE_KEY);
                const data = raw ? JSON.parse(raw) : [];
                return Array.isArray(data) ? data : [];
            } catch (e) { return []; }
        }
        function saveDone() { try { localStorage.setItem(DONE_KEY, JSON.stringify(doneKeys)); } catch (e) { /* 무시 */ } }

        let currentLang = 'hi';
        let doneKeys = loadDone();
        const t = () => translations[currentLang];

        // --- 3. 렌더링 ---
        function renderList() {
            const list = document.getElementById('hw-list');
            list.innerHTML = '';
            HW_ITEMS.forEach(item => {
                const done = doneKeys.includes(item.key);
                const li = document.createElement('li');
                li.className = `flex items-center gap-4 p-4 rounded-3xl shadow-sm border-2 cursor-pointer transition select-none active:scale-95 ${done ? 'bg-success/10 border-success' : 'bg-white border-blue-100'}`;
                li.onclick = () => toggleItem(item.key);
                li.innerHTML = `
                    <span class="text-3xl w-12 h-12 flex items-center justify-center rounded-full ${done ? 'bg-success/20' : 'bg-blue-50'} shrink-0">${item.icon}</span>
                    <span class="flex-1 text-lg font-bold ${done ? 'text-success line-through' : 'text-gray-700'}">${t()[item.key]}</span>
                    <span class="text-3xl shrink-0">${done ? '✅' : '⬜'}</span>
                `;
                list.appendChild(li);
            });
            updateProgress();
        }

        function updateProgress() {
            const total = HW_ITEMS.length;
            const done = doneKeys.length;
            const pct = total ? Math.round((done / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
            document.getElementById('progress-text').innerText = `${done} / ${total}`;
            document.getElementById('celebrate').classList.toggle('hidden-screen', done < total || total === 0);
        }

        // --- 4. 로직 ---
        function toggleItem(key) {
            if (doneKeys.includes(key)) {
                doneKeys = doneKeys.filter(k => k !== key);
            } else {
                doneKeys.push(key);
            }
            saveDone();
            renderList();
        }

        function resetToday() {
            doneKeys = [];
            saveDone();
            renderList();
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            try { localStorage.setItem(LANG_KEY, lang); } catch (e) { /* 무시 */ }
            const tr = t();
            document.getElementById('t-main-title').innerText = tr.mainTitle;
            document.getElementById('t-app-desc').innerText = tr.appDesc;
            document.getElementById('t-greeting').innerText = tr.greeting;
            document.getElementById('t-celebrate').innerText = tr.celebrate;
            document.getElementById('t-btn-reset').innerText = tr.btnReset;

            // 언어 버튼 강조
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const active = btn.dataset.lang === lang;
                btn.classList.toggle('text-primary', active);
                btn.classList.toggle('text-gray-400', !active);
            });

            renderList(); // 항목 텍스트도 새 언어로 갱신
        }

        // --- 초기화 ---
        changeLanguage(getInitialLang());
    </script>
</body>
</html>
