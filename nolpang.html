<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nolpang (Play Time!) | नोलपंग</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8E%88%3C/text%3E%3C/svg%3E">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 폰트: 본문·타이틀 통합 Pretendard GOV (한국어·영문) + 힌디용 Noto Sans Devanagari -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-gov-dynamic-subset.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFECB3',
                        primaryDark: '#FFC02E',
                        secondary: '#F5991E',
                        accent: '#3AA0E0',
                        textMain: '#3E2723',
                    },
                    boxShadow: { 'cute': '0 10px 25px -5px rgba(245, 153, 30, 0.4)' }
                }
            }
        }
    </script>

    <style>
        .font-title { font-family: "Pretendard GOV Variable", "Pretendard GOV", "Noto Sans Devanagari", sans-serif; font-weight: 800; }
        .font-body { font-family: "Pretendard GOV Variable", "Pretendard GOV", "Noto Sans Devanagari", sans-serif; font-weight: 500; }

        body { background-color: #FFF8E1; color: #3E2723; -webkit-tap-highlight-color: transparent; word-break: keep-all; overflow-wrap: break-word; }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .btn-press:active { transform: scale(0.95); }
        ::-webkit-scrollbar { display: none; }

        body { margin: 0; }
        #app { width: 100%; max-width: 480px; margin: 0 auto; }
        @media (min-width: 540px) {
            body { padding-top: 24px; padding-bottom: 24px; }
            #app { min-height: calc(100vh - 48px) !important; border-radius: 32px; box-shadow: 0 24px 70px rgba(120, 80, 0, 0.18); }
        }
    </style>
</head>
<body class="font-body antialiased flex justify-center min-h-screen">

    <div id="app" class="w-full bg-white relative flex flex-col min-h-screen overflow-hidden">

        <!-- 상단 헤더 -->
        <header class="bg-primary pt-9 pb-4 px-6 rounded-b-3xl shadow-sm z-10">
            <div class="flex justify-between items-center">
                <h1 class="font-title text-4xl text-secondary tracking-wide drop-shadow-sm">🎈नोलपंग</h1>
                <!-- 언어 선택 -->
                <div class="flex gap-1" id="lang-switch">
                    <button onclick="setLanguage('ko')" data-lang="ko" class="lang-btn btn-press bg-white/80 text-textMain font-title text-base min-w-[44px] py-2 rounded-full shadow-sm" aria-label="Korean">KR</button>
                    <button onclick="setLanguage('en')" data-lang="en" class="lang-btn btn-press bg-white/80 text-textMain font-title text-base min-w-[44px] py-2 rounded-full shadow-sm" aria-label="English">EN</button>
                    <button onclick="setLanguage('hi')" data-lang="hi" class="lang-btn btn-press bg-white/80 text-textMain font-title text-base min-w-[44px] py-2 rounded-full shadow-sm" aria-label="Hindi">HI</button>
                </div>
            </div>
            <!-- 이름 뜻 설명 -->
            <p id="name-meaning" class="mt-1 text-sm font-bold text-secondary/90">नोलपंग = 'खेल-पैंग'! खेलने का समय बढ़ाओ 🎉</p>
        </header>

        <!-- 메인 콘텐츠 -->
        <main id="main-content" class="flex-1 overflow-y-auto p-6 pb-28 bg-[#FFF8E1] fade-in"></main>

        <!-- 하단 네비게이션 -->
        <nav class="absolute bottom-0 w-full bg-white rounded-t-3xl shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <div class="flex justify-around items-center p-3">
                <button onclick="navigate('home')" class="flex flex-col items-center btn-press p-2" aria-label="Home tab">
                    <span class="text-3xl mb-1" id="nav-icon-home">🐷</span>
                    <span class="text-sm text-gray-500 font-title" id="nav-text-home">मुख्य</span>
                </button>
                <button onclick="navigate('tasks')" class="flex flex-col items-center btn-press p-2" aria-label="Tasks tab">
                    <span class="text-3xl mb-1" id="nav-icon-tasks">✅</span>
                    <span class="text-sm text-gray-500 font-title" id="nav-text-tasks">कार्य</span>
                </button>
                <button onclick="navigate('ideas')" class="flex flex-col items-center btn-press p-2" aria-label="Play tab">
                    <span class="text-3xl mb-1" id="nav-icon-ideas">🎮</span>
                    <span class="text-sm text-gray-500 font-title" id="nav-text-ideas">खेल</span>
                </button>
            </div>
        </nav>
    </div>

    <!-- 인앱 토스트 -->
    <div id="toast" class="hidden fixed left-1/2 -translate-x-1/2 bottom-28 z-50 bg-textMain text-white font-bold text-lg px-6 py-4 rounded-3xl shadow-2xl text-center max-w-[85%]"></div>

    <!-- 확인 모달 -->
    <div id="confirm" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-6">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm text-center shadow-2xl">
            <p id="confirm-msg" class="text-xl font-bold text-textMain mb-6"></p>
            <div class="flex gap-3">
                <button id="confirm-no" class="flex-1 bg-gray-200 text-gray-700 font-bold py-3 rounded-2xl text-lg btn-press"></button>
                <button id="confirm-yes" class="flex-1 bg-secondary text-white font-bold py-3 rounded-2xl text-lg btn-press"></button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 다국어 데이터 ---
        const translations = {
            ko: {

                min: "분",
                // 홈

                // 할 일
                title_tasks: "할 일 끝내고 놀 시간 벌기",

                done_label: "완료됨",
                tap_done: "완료하기",
                add_title: "나만의 할 일 추가하기",
                ph_task: "할 일 이름 (예: 방 정리)",
                ph_min: "분",
                btn_add: "추가",
                add_empty: "할 일 이름과 시간(분)을 적어주세요!",
                added_toast: "새 할 일을 추가했어요!",
                earn_toast: "놀 시간 +{n}분 저금! 🎉",
                undo_toast: "완료를 취소했어요 (-{n}분)",
                del_task: "이 할 일을 지울까요?",
                // 놀기
                title_ideas: "모은 시간으로 놀기",
                guide_ideas: "놀이를 고르면 모은 놀 시간을 써요. 재미있게 놀아요!",

                btn_play: "놀기",
                play_ok: "신나게 놀아요! 🎉 (-{n}분)",

                btn_reset: "🔄 오늘 새로 시작",
                confirm_reset: "오늘 기록을 새로 시작할까요? 모은 시간이 0이 돼요.",
                yes: "네", no: "아니요",
                // 프리셋 할 일
                task_focus_hw: "숙제 집중해서 빨리 끝내기",
                task_clean: "방·책상 빨리 정리하기",
                task_saved: "TV·게임 대신 아낀 시간",
                task_help: "심부름·집안일 돕기",
                // 프리셋 놀이
                idea_word: "끝말잇기", idea_word_d: "친구·가족과 단어를 이어봐요!",
                idea_origami: "종이접기", idea_origami_d: "색종이로 비행기·배를 접어요!",
                idea_dance: "스트레칭 댄스", idea_dance_d: "음악을 틀고 신나게 움직여요!",
                idea_draw: "그림 그리기", idea_draw_d: "좋아하는 걸 마음껏 그려요!"
            },
            en: {
                nameMeaning: "Nolpang = ‘Play-Pang’! Pop up more time to play 🎉",
                nav_home: "Bank", nav_tasks: "To-Do", nav_ideas: "Play",
                min: "min",
                title_home: "My Playtime Bank",
                concept_home: "Finish tasks with focus, or save time you’d waste — and it turns into playtime!",
                bank_label: "Playtime saved",
                go_earn: "⏱️ Go earn playtime",
                go_play: "🎮 Play with saved time",
                title_tasks: "Finish tasks, earn playtime",
                guide_tasks: "Tap a task to mark it ‘done’ and bank the playtime.",
                done_label: "Done",
                tap_done: "Mark done",
                add_title: "Add your own task",
                ph_task: "Task name (e.g. tidy room)",
                ph_min: "min",
                btn_add: "Add",
                add_empty: "Please write a task name and minutes!",
                added_toast: "New task added!",
                earn_toast: "Playtime +{n} min banked! 🎉",
                undo_toast: "Undone (-{n} min)",
                del_task: "Delete this task?",
                title_ideas: "Play with saved time",
                guide_ideas: "Pick a game to spend your saved playtime. Have fun!",
                need_label: "needs",
                btn_play: "Play",
                play_ok: "Have fun! 🎉 (-{n} min)",
                need_more: "Not enough playtime. Finish a task first! 💪",
                btn_reset: "🔄 Start today over",
                confirm_reset: "Start today over? Your saved time goes back to 0.",
                yes: "Yes", no: "No",
                task_focus_hw: "Finish homework with focus",
                task_clean: "Tidy room & desk fast",
                task_saved: "Time saved instead of TV/games",
                task_help: "Help with chores",
                idea_word: "Word Chain", idea_word_d: "Connect words with family or friends!",
                idea_origami: "Origami", idea_origami_d: "Fold paper planes or boats!",
                idea_dance: "Stretching Dance", idea_dance_d: "Turn on music and move!",
                idea_draw: "Drawing", idea_draw_d: "Draw whatever you love!"
            },
            hi: {
                nameMeaning: "नोलपंग = ‘खेल-पैंग’! खेलने का समय बढ़ाओ 🎉",
                nav_home: "बैंक", nav_tasks: "कार्य", nav_ideas: "खेल",
                min: "मिनट",
                title_home: "मेरा खेल समय बैंक",
                concept_home: "काम ध्यान से जल्दी खत्म करो, या बर्बाद होने वाला समय बचाओ — वही ‘खेल समय’ बन जाता है!",
                bank_label: "जमा खेल समय",
                go_earn: "⏱️ खेल समय कमाने जाएँ",
                go_play: "🎮 जमा समय से खेलें",
                title_tasks: "काम खत्म करो, खेल समय कमाओ",
                guide_tasks: "काम दबाकर ‘पूरा’ करें, खेल समय बैंक में जमा हो जाता है।",
                done_label: "पूरा",
                tap_done: "पूरा करें",
                add_title: "अपना काम जोड़ें",
                ph_task: "काम का नाम (जैसे कमरा साफ)",
                ph_min: "मिनट",
                btn_add: "जोड़ें",
                add_empty: "कृपया काम का नाम और मिनट लिखें!",
                added_toast: "नया काम जोड़ा गया!",
                earn_toast: "खेल समय +{n} मिनट जमा! 🎉",
                undo_toast: "पूरा रद्द किया (-{n} मिनट)",
                del_task: "यह काम हटाएँ?",
                title_ideas: "जमा समय से खेलें",
                guide_ideas: "खेल चुनें और जमा खेल समय खर्च करें। मज़े करो!",
                need_label: "चाहिए",
                btn_play: "खेलो",
                play_ok: "मज़े करो! 🎉 (-{n} मिनट)",
                need_more: "खेल समय कम है। पहले एक काम पूरा करो! 💪",
                btn_reset: "🔄 आज नया शुरू करें",
                confirm_reset: "आज नया शुरू करें? जमा समय 0 हो जाएगा।",
                yes: "हाँ", no: "नहीं",
                task_focus_hw: "होमवर्क ध्यान से जल्दी करना",
                task_clean: "कमरा·मेज़ जल्दी साफ करना",
                task_saved: "TV·गेम की जगह बचाया समय",
                task_help: "घर के काम में मदद",
                idea_word: "शब्द-श्रृंखला", idea_word_d: "दोस्तों-परिवार के साथ शब्द जोड़ें!",
                idea_origami: "ओरिगामी", idea_origami_d: "कागज़ के हवाई जहाज़-नाव बनाएँ!",
                idea_dance: "डांस", idea_dance_d: "संगीत चलाओ और हिलो-डुलो!",
                idea_draw: "चित्र बनाना", idea_draw_d: "जो पसंद हो वो बनाओ!"
            }
        };

        // 허브·다른 앱과 언어 공유
        const LANG_KEY = 'dbfi_lang';
        const SUPPORTED_LANGS = ['ko', 'en', 'hi'];
        function getInitialLang() {
            try { const p = new URLSearchParams(location.search).get('lang'); if (p && SUPPORTED_LANGS.includes(p)) return p; } catch (e) {}
            try { const s = localStorage.getItem(LANG_KEY); if (s && SUPPORTED_LANGS.includes(s)) return s; } catch (e) {}
            return 'hi';
        }

        // 프리셋 할 일 (기본값)
        function defaultTasks() {
            return [
                { id: 1, key: 'task_focus_hw', time: 15, done: false, icon: '📚' },
                { id: 2, key: 'task_clean',    time: 10, done: false, icon: '🧸' },
                { id: 3, key: 'task_saved',    time: 10, done: false, icon: '📺' },
                { id: 4, key: 'task_help',     time: 10, done: false, icon: '🧹' },
            ];
        }

        // 놀이 아이디어 (시간 소모)
        const IDEAS = [
            { key: 'idea_word',    desc: 'idea_word_d',    cost: 10, icon: '🗣️' },
            { key: 'idea_origami', desc: 'idea_origami_d', cost: 15, icon: '✈️' },
            { key: 'idea_dance',   desc: 'idea_dance_d',   cost: 20, icon: '🤸' },
            { key: 'idea_draw',    desc: 'idea_draw_d',    cost: 15, icon: '🎨' },
        ];

        // --- 2. 상태 ---
        const state = { currentScreen: 'home', lang: getInitialLang(), savedTime: 0, tasks: defaultTasks() };

        const STATE_KEY = 'nolpangState2';
        function saveState() {
            try { localStorage.setItem(STATE_KEY, JSON.stringify({ savedTime: state.savedTime, tasks: state.tasks })); } catch (e) {}
        }
        function loadState() {
            try {
                const raw = localStorage.getItem(STATE_KEY);
                if (!raw) return;
                const d = JSON.parse(raw);
                if (typeof d.savedTime === 'number') state.savedTime = d.savedTime;
                if (Array.isArray(d.tasks) && d.tasks.length) state.tasks = d.tasks;
            } catch (e) {}
        }

        const t = (key) => translations[state.lang][key] || key;
        const label = (task) => task.key ? t(task.key) : (task.text || '');
        const fmt = (str, n) => str.replace('{n}', n);

        // --- 3. 렌더링 ---
        function renderHome() {
            return `
                <div class="flex flex-col items-center text-center space-y-5 mt-2">
                    <h2 class="text-2xl font-title text-textMain">${t('title_home')}</h2>
                    <p class="bg-white border-2 border-primaryDark rounded-2xl px-4 py-3 text-base leading-relaxed text-textMain shadow-sm">${t('concept_home')}</p>
                    <div class="w-52 h-52 rounded-full bg-white border-8 border-primaryDark shadow-cute flex flex-col items-center justify-center relative">
                        <div class="absolute -top-6 text-5xl">🐷</div>
                        <span class="text-sm text-gray-500 mt-4">${t('bank_label')}</span>
                        <span class="text-6xl font-title text-secondary leading-none">${state.savedTime}</span>
                        <span class="text-lg text-gray-500">${t('min')}</span>
                    </div>
                    <div class="w-full max-w-xs flex flex-col gap-3 pt-2">
                        <button onclick="navigate('tasks')" class="btn-press bg-secondary text-white font-title text-lg py-4 rounded-full shadow-cute">${t('go_earn')}</button>
                        <button onclick="navigate('ideas')" class="btn-press bg-accent text-white font-title text-lg py-4 rounded-full shadow-sm">${t('go_play')}</button>
                    </div>
                </div>`;
        }

        function renderTasks() {
            let html = `
                <h2 class="text-2xl font-title text-textMain mb-1 text-center">${t('title_tasks')}</h2>
                <p class="bg-white rounded-2xl p-3 mb-4 text-center text-base text-gray-600 shadow-sm">${t('guide_tasks')}</p>
                <div class="space-y-3">`;
            state.tasks.forEach(task => {
                html += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-3 ${task.done ? 'opacity-60' : ''}">
                        <span class="text-3xl w-12 h-12 flex items-center justify-center rounded-full bg-primary shadow-inner shrink-0">${task.icon || '⭐'}</span>
                        <div class="flex-1 min-w-0">
                            <p class="text-lg text-textMain ${task.done ? 'line-through' : ''} break-words">${label(task)}</p>
                            <p class="text-sm font-bold text-accent">+${task.time}${t('min')}</p>
                        </div>
                        ${task.done
                            ? `<button onclick="undoTask(${task.id})" class="shrink-0 bg-green-100 text-green-700 font-bold px-4 py-2 rounded-full text-sm btn-press">✓ ${t('done_label')}</button>`
                            : `<button onclick="completeTask(${task.id})" class="shrink-0 bg-secondary text-white font-bold px-4 py-2 rounded-full text-sm btn-press">${t('tap_done')}</button>`}
                        <button onclick="deleteTask(${task.id})" class="shrink-0 text-gray-300 hover:text-red-400 text-2xl leading-none px-1" aria-label="delete">×</button>
                    </div>`;
            });
            html += `</div>`;

            // 사용자 정의 할 일 추가 폼
            html += `
                <div class="mt-6 bg-white rounded-3xl shadow-sm p-4">
                    <p class="font-title text-lg text-textMain mb-3">➕ ${t('add_title')}</p>
                    <input id="new-task-name" type="text" maxlength="30" placeholder="${t('ph_task')}"
                        class="w-full mb-2 p-3 border-2 border-gray-200 rounded-2xl text-base focus:border-secondary outline-none">
                    <div class="flex gap-2">
                        <input id="new-task-min" type="number" min="1" max="120" placeholder="${t('ph_min')}"
                            class="w-24 p-3 border-2 border-gray-200 rounded-2xl text-base text-center focus:border-secondary outline-none">
                        <button onclick="addTask()" class="flex-1 bg-secondary text-white font-bold py-3 rounded-2xl text-base btn-press">${t('btn_add')}</button>
                    </div>
                </div>
                <button onclick="askReset()" class="mt-4 w-full text-gray-500 font-bold py-3 rounded-2xl border-2 border-gray-200 btn-press">${t('btn_reset')}</button>`;
            return html;
        }

        function renderIdeas() {
            let html = `
                <h2 class="text-2xl font-title text-textMain mb-1 text-center">${t('title_ideas')}</h2>
                <p class="bg-white rounded-2xl p-3 mb-2 text-center text-base text-gray-600 shadow-sm">${t('guide_ideas')}</p>
                <p class="text-center text-secondary font-title text-xl mb-4">🐷 ${state.savedTime}${t('min')}</p>
                <div class="grid grid-cols-1 gap-4">`;
            IDEAS.forEach((idea, i) => {
                const enough = state.savedTime >= idea.cost;
                html += `
                    <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 border-l-8 border-secondary">
                        <span class="text-4xl shrink-0">${idea.icon}</span>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-xl font-title text-textMain">${t(idea.key)}</h3>
                            <p class="text-gray-600 text-sm">${t(idea.desc)}</p>
                            <p class="text-xs font-bold text-accent mt-1">${t('need_label')} ${idea.cost}${t('min')}</p>
                        </div>
                        <button onclick="playIdea(${i})" class="shrink-0 font-bold px-5 py-3 rounded-full text-base btn-press ${enough ? 'bg-secondary text-white' : 'bg-gray-200 text-gray-400'}">${t('btn_play')}</button>
                    </div>`;
            });
            html += `</div>`;
            return html;
        }

        // --- 4. 로직 ---
        function navigate(screen) { state.currentScreen = screen; updateApp(); updateNavUI(); }

        function setLanguage(lang) {
            state.lang = lang;
            document.documentElement.lang = lang;
            try { localStorage.setItem(LANG_KEY, lang); } catch (e) {}
            document.getElementById('name-meaning').textContent = t('nameMeaning');
            updateApp(); updateNavUI(); updateLangButtons();
        }

        function completeTask(id) {
            const task = state.tasks.find(x => x.id === id);
            if (task && !task.done) {
                task.done = true;
                state.savedTime += task.time;
                saveState();
                showToast(fmt(t('earn_toast'), task.time));
                updateApp();
            }
        }
        function undoTask(id) {
            const task = state.tasks.find(x => x.id === id);
            if (task && task.done) {
                task.done = false;
                state.savedTime = Math.max(0, state.savedTime - task.time);
                saveState();
                showToast(fmt(t('undo_toast'), task.time));
                updateApp();
            }
        }
        function deleteTask(id) {
            showConfirm(t('del_task'), () => {
                state.tasks = state.tasks.filter(x => x.id !== id);
                saveState(); updateApp();
            });
        }
        function addTask() {
            const nameEl = document.getElementById('new-task-name');
            const minEl = document.getElementById('new-task-min');
            const name = (nameEl.value || '').trim();
            const min = parseInt(minEl.value, 10);
            if (!name || !min || min < 1) { showToast(t('add_empty')); return; }
            const id = Date.now();
            state.tasks.push({ id, text: name, time: min, done: false, icon: '⭐' });
            saveState();
            showToast(t('added_toast'));
            updateApp();
        }
        function playIdea(i) {
            const idea = IDEAS[i];
            if (state.savedTime < idea.cost) { showToast(t('need_more')); return; }
            state.savedTime -= idea.cost;
            saveState();
            showToast(fmt(t('play_ok'), idea.cost));
            updateApp();
        }
        function askReset() {
            showConfirm(t('confirm_reset'), () => {
                state.savedTime = 0;
                state.tasks = defaultTasks();
                saveState(); navigate('home');
            });
        }

        function updateApp() {
            const el = document.getElementById('main-content');
            el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in');
            const map = { home: renderHome, tasks: renderTasks, ideas: renderIdeas };
            el.innerHTML = (map[state.currentScreen] || renderHome)();
        }

        function updateNavUI() {
            const tabs = ['home', 'tasks', 'ideas'];
            tabs.forEach(tab => { document.getElementById(`nav-text-${tab}`).innerText = t(`nav_${tab}`); });
            tabs.forEach(tab => {
                const icon = document.getElementById(`nav-icon-${tab}`);
                const text = document.getElementById(`nav-text-${tab}`);
                const on = state.currentScreen === tab;
                text.classList.toggle('text-secondary', on);
                text.classList.toggle('text-gray-500', !on);
                icon.classList.toggle('scale-125', on);
            });
        }

        function updateLangButtons() {
            document.querySelectorAll('#lang-switch .lang-btn').forEach(btn => {
                const on = btn.dataset.lang === state.lang;
                btn.classList.toggle('bg-secondary', on);
                btn.classList.toggle('text-white', on);
                btn.classList.toggle('bg-white/80', !on);
                btn.classList.toggle('text-textMain', !on);
            });
        }

        // 토스트 & 확인 모달
        let toastTimer;
        function showToast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.remove('hidden');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.add('hidden'), 2600);
        }
        function showConfirm(msg, onYes) {
            const modal = document.getElementById('confirm');
            document.getElementById('confirm-msg').textContent = msg;
            const yes = document.getElementById('confirm-yes');
            const no = document.getElementById('confirm-no');
            yes.textContent = t('yes'); no.textContent = t('no');
            modal.classList.remove('hidden');
            const close = () => { modal.classList.add('hidden'); yes.onclick = null; no.onclick = null; };
            yes.onclick = () => { close(); onYes(); };
            no.onclick = close;
        }

        // --- 5. 초기화 ---
        window.onload = () => {
            loadState();
            document.documentElement.lang = state.lang;
            document.getElementById('name-meaning').textContent = t('nameMeaning');
            updateApp(); updateNavUI(); updateLangButtons();
        };
    </script>
</body>
</html>
