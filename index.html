<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Bridge for India | समस्या-समाधान मित्र</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8C%89%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans:wght@400;500;700;800&family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  :root {
    --color-primary: #2F6DB0;
    --color-primary-dark: #1E5290;

    --color-pastel-green:  #C8EDD9;
    --color-pastel-yellow: #FFF0B0;
    --color-pastel-blue:   #CDE3FA;
    --color-pastel-pink:   #FFD6E0;

    --color-pastel-green-dark:  #14663F;
    --color-pastel-yellow-dark: #6E5600;
    --color-pastel-blue-dark:   #14507F;
    --color-pastel-pink-dark:   #8A2840;

    --color-text:      #23303C;
    --color-text-soft: #566674;
    --color-white:     #FFFFFF;
    --color-border:    #E1E9F1;
    --shadow-card: 0 6px 20px rgba(30, 70, 120, 0.10);
    --shadow-card-hover: 0 14px 34px rgba(30, 70, 120, 0.18);

    --radius-lg: 22px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html { font-size: 16px; }

  body {
    font-family: 'Noto Sans', 'Noto Sans Devanagari', system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: linear-gradient(160deg, #E8F3FF 0%, #F3F6FA 45%, #FFEAF1 100%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--color-text);
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .title-font { font-family: 'Black Han Sans', 'Noto Sans Devanagari', sans-serif; font-weight: 400; }

  /* ================= 상단 헤더 (전체 폭) ================= */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px clamp(16px, 4vw, 40px);
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--color-border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    flex: 1 1 auto;
  }
  .brand .logo { font-size: clamp(1.6rem, 4vw, 2rem); line-height: 1; flex-shrink: 0; }
  .brand .brand-name {
    font-family: 'Black Han Sans', 'Noto Sans Devanagari', sans-serif;
    font-size: clamp(1.15rem, 3.4vw, 1.6rem);
    color: var(--color-primary-dark);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }

  .lang-switch { display: flex; gap: 6px; flex-shrink: 0; }
  .lang-btn {
    border: none;
    background: rgba(255,255,255,0.9);
    box-shadow: inset 0 0 0 1px var(--color-border);
    color: var(--color-text);
    font-weight: 800;
    font-size: 0.95rem;
    min-width: 46px;
    min-height: 42px;
    padding: 8px 12px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn.active { background: var(--color-primary); color: #fff; box-shadow: none; }
  .lang-btn:active { transform: scale(0.94); }
  .lang-btn:focus-visible, .app-card:focus-visible, .home-btn:focus-visible {
    outline: none; box-shadow: 0 0 0 4px rgba(47,109,176,0.30);
  }

  /* ================= 허브(홈) ================= */
  #hubView { flex: 1; display: flex; flex-direction: column; }

  .hub-main {
    width: 100%;
    max-width: 1060px;
    margin: 0 auto;
    padding: clamp(24px, 4vw, 44px) clamp(16px, 4vw, 40px) 40px;
    flex: 1;
  }

  .hub-intro { text-align: center; margin-bottom: clamp(22px, 4vw, 36px); }
  .hub-title {
    font-family: 'Black Han Sans', 'Noto Sans Devanagari', sans-serif;
    font-size: clamp(2rem, 6vw, 3rem);
    line-height: 1.2;
    color: var(--color-primary-dark);
  }
  .hub-subtitle {
    font-size: clamp(1.05rem, 2.6vw, 1.35rem);
    color: var(--color-text-soft);
    margin-top: 10px;
    font-weight: 500;
  }

  .hub-guide {
    margin: 22px auto 0;
    max-width: 720px;
    display: grid;
    gap: 10px;
  }
  .guide-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.78);
    border: 1px solid var(--color-border);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: clamp(0.95rem, 2.2vw, 1.1rem);
    font-weight: 600;
    color: var(--color-text);
    text-align: left;
  }
  .guide-chip .chip-emoji { font-size: 1.4rem; line-height: 1; flex-shrink: 0; }

  /* 카드 그리드: 화면 폭에 맞춰 늘어남 */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(208px, 1fr));
    gap: clamp(16px, 2.4vw, 24px);
  }

  .app-card {
    border-radius: var(--radius-lg);
    padding: clamp(22px, 3vw, 32px) 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 8px;
    cursor: pointer;
    border: none;
    box-shadow: var(--shadow-card);
    transition: transform 0.18s, box-shadow 0.18s;
    font-family: inherit;
    min-height: 230px;
    justify-content: center;
  }
  .app-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-card-hover); }
  .app-card:active { transform: scale(0.97); }

  .app-card .icon { font-size: clamp(3rem, 7vw, 4rem); line-height: 1; }
  .app-card .name { font-family: 'Black Han Sans', 'Noto Sans Devanagari', sans-serif; font-size: clamp(1.35rem, 3vw, 1.7rem); }
  .app-card .meaning {
    font-size: 0.9rem;
    font-weight: 700;
    opacity: 0.85;
    background: rgba(255,255,255,0.55);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
  }
  .app-card .desc { font-size: clamp(0.95rem, 2vw, 1.05rem); line-height: 1.45; font-weight: 500; }
  .app-card .open-btn {
    margin-top: 6px;
    font-size: 1.05rem;
    font-weight: 800;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .card-green  { background: var(--color-pastel-green);  color: var(--color-pastel-green-dark); }
  .card-yellow { background: var(--color-pastel-yellow); color: var(--color-pastel-yellow-dark); }
  .card-blue   { background: var(--color-pastel-blue);   color: var(--color-pastel-blue-dark); }
  .card-pink   { background: var(--color-pastel-pink);   color: var(--color-pastel-pink-dark); }

  /* ================= 푸터 ================= */
  .site-footer {
    padding: 16px;
    text-align: center;
    border-top: 1px solid var(--color-border);
    background: rgba(255,255,255,0.5);
  }
  .site-footer a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.9rem;
    color: var(--color-text-soft);
    text-decoration: none;
  }

  /* ================= 앱 뷰어 (폰 프레임) ================= */
  #appView { display: none; flex: 1; flex-direction: column; }
  .app-viewport {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
  }
  @media (min-width: 560px) {
    .app-viewport { padding: 20px 0; }
  }
  .app-topbar {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px clamp(12px, 4vw, 20px);
  }
  .home-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border: none;
    background: var(--color-primary);
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    padding: 10px 18px;
    border-radius: var(--radius-pill);
    cursor: pointer;
  }
  .home-btn:active { transform: scale(0.95); }
  #currentAppName { font-size: 1rem; font-weight: 700; color: var(--color-text-soft); }

  .app-frame-wrap {
    flex: 1;
    display: flex;
    min-height: 0;
    padding: 0 clamp(0px, 4vw, 20px) clamp(0px, 4vw, 20px);
  }
  #appFrame {
    flex: 1;
    width: 100%;
    border: none;
    display: block;
    border-radius: 24px;
    background: #fff;
    box-shadow: 0 20px 60px rgba(0, 40, 90, 0.16);
  }
  @media (max-width: 559px) {
    .app-frame-wrap { padding: 0; }
    #appFrame { border-radius: 0; box-shadow: none; }
  }
  @media (max-width: 480px) {
    .lang-btn { min-width: 40px; padding: 8px 9px; font-size: 0.85rem; }
    .lang-switch { gap: 4px; }
  }
</style>
</head>
<body>

  <!-- ================= 허브(홈) 화면 ================= -->
  <div id="hubView">
    <header class="site-header">
      <div class="brand">
        <span class="logo">🌉</span>
        <span class="brand-name" data-i18n="brand">समस्या-समाधान मित्र</span>
      </div>
      <div class="lang-switch">
        <button class="lang-btn" id="langBtn-ko" onclick="setLang('ko')" aria-label="Korean">KR</button>
        <button class="lang-btn" id="langBtn-en" onclick="setLang('en')" aria-label="English">EN</button>
        <button class="lang-btn active" id="langBtn-hi" onclick="setLang('hi')" aria-label="हिन्दी">HI</button>
      </div>
    </header>

    <main class="hub-main">
      <div class="hub-intro">
        <h1 class="hub-title" data-i18n="main_title">समस्या-समाधान मित्र</h1>
        <p class="hub-subtitle" data-i18n="main_subtitle">दुनिया के दोस्तों के लिए हमने बनाए ये ऐप्स</p>
        <div class="hub-guide" aria-label="Guide">
          <div class="guide-chip"><span class="chip-emoji">🌍</span><span data-i18n="guide_lang">दुनिया भर के बच्चों की छोटी-छोटी चिंताएँ हल करने में मदद के लिए बनाया गया।</span></div>
          <div class="guide-chip"><span class="chip-emoji">👆</span><span data-i18n="guide_simple">शुरू करने के लिए बड़े चित्र वाले कार्ड पर टैप करें।</span></div>
        </div>
      </div>

      <div class="card-grid">
        <button class="app-card card-green" onclick="openApp('global-exercise.html','global')">
          <span class="icon">🏃</span>
          <span class="name" data-i18n="name_global">ग्लोबल एक्सरसाइज़</span>
          <span class="desc" data-i18n="desc_global">स्वस्थ व्यायाम की आदत बनाता है</span>
          <span class="open-btn"><span data-i18n="open">खोलें</span> →</span>
        </button>

        <button class="app-card card-yellow" onclick="openApp('nolpang.html','nolpang')">
          <span class="icon">🎈</span>
          <span class="name" data-i18n="name_nolpang">नोलपंग</span>
          <span class="meaning" data-i18n="mean_nolpang">= 'खेल-पैंग': खेलने का समय बढ़ाओ!</span>
          <span class="desc" data-i18n="desc_nolpang">काम खत्म करो, फिर खुशी से खेलो</span>
          <span class="open-btn"><span data-i18n="open">खोलें</span> →</span>
        </button>

        <button class="app-card card-blue" onclick="openApp('homework-helper.html','homework')">
          <span class="icon">📝</span>
          <span class="name" data-i18n="name_homework">होमवर्क हेल्पर</span>
          <span class="desc" data-i18n="desc_homework">होमवर्क याद रखने में मदद करता है</span>
          <span class="open-btn"><span data-i18n="open">खोलें</span> →</span>
        </button>

        <button class="app-card card-pink" onclick="openApp('shipdae.html','shipdae')">
          <span class="icon">🎤</span>
          <span class="name" data-i18n="name_shipdae">बोलो, हम साथ हैं!</span>
          <span class="desc" data-i18n="desc_shipdae">बोलते समय घबराहट होने पर हिम्मत देता है</span>
          <span class="open-btn"><span data-i18n="open">खोलें</span> →</span>
        </button>
      </div>
    </main>

    <footer class="site-footer">
      <a href="https://litt.ly/chichiboo" target="_blank" rel="noopener noreferrer">
        📖 Created by Chichiboo
      </a>
    </footer>
  </div>

  <!-- ================= 앱 뷰어 화면 ================= -->
  <div id="appView">
    <div class="app-viewport">
      <div class="app-topbar">
        <button class="home-btn" onclick="closeApp()">
          🏠 <span data-i18n="back">होम</span>
        </button>
        <span id="currentAppName"></span>
      </div>
      <div class="app-frame-wrap">
        <iframe id="appFrame" src="about:blank" title="app"></iframe>
      </div>
    </div>
  </div>

<script>
  const translations = {
    ko: {
      brand: "고민해결 프렌즈",
      main_title: "고민해결 프렌즈",
      main_subtitle: "세계 친구들을 위해 우리가 만든 앱이에요",
      guide_lang: "세계 어린이들의 작은 고민을 해결하도록 돕기 위해 만들었어요.",
      guide_simple: "큰 그림 카드를 누르면 바로 시작해요.",
      main_note: "카드를 눌러서 앱을 열어보세요!",
      name_global: "글로벌 운동",
      desc_global: "건강하게 운동하는 습관을 길러줘요",
      name_nolpang: "놀팡",
      mean_nolpang: "= '놀이 팡팡': 놀 시간을 팡팡 모아요!",
      desc_nolpang: "할 일을 끝내고 신나게 놀아요",
      name_homework: "숙제챙겨",
      desc_homework: "숙제를 깜빡하지 않게 도와줘요",
      name_shipdae: "너의 발표를 응원해",
      desc_shipdae: "발표할 때 떨리지 않게 응원해줘요",
      open: "열기",
      back: "홈으로"
    },
    en: {
      brand: "Worry-Solving Friends",
      main_title: "Worry-Solving Friends",
      main_subtitle: "Apps we made for friends around the world",
      guide_lang: "Made to help solve the little worries of children around the world.",
      guide_simple: "Tap a big picture card to start right away.",
      main_note: "Tap a card to open the app!",
      name_global: "Global Exercise",
      desc_global: "Builds healthy exercise habits",
      name_nolpang: "Nolpang",
      mean_nolpang: "= 'Play-Pang': pop up more time to play!",
      desc_nolpang: "Finish your tasks, then play happily",
      name_homework: "Homework Helper",
      desc_homework: "Helps you remember your homework",
      name_shipdae: "Cheer Your Speech",
      desc_shipdae: "Cheers you on when you feel nervous speaking",
      open: "Open",
      back: "Home"
    },
    hi: {
      brand: "समस्या-समाधान मित्र",
      main_title: "समस्या-समाधान मित्र",
      main_subtitle: "दुनिया के दोस्तों के लिए हमने बनाए ये ऐप्स",
      guide_lang: "दुनिया भर के बच्चों की छोटी-छोटी चिंताएँ हल करने में मदद के लिए बनाया गया।",
      guide_simple: "शुरू करने के लिए बड़े चित्र वाले कार्ड पर टैप करें।",
      main_note: "ऐप खोलने के लिए कार्ड पर टैप करें!",
      name_global: "ग्लोबल एक्सरसाइज़",
      desc_global: "स्वस्थ व्यायाम की आदत बनाता है",
      name_nolpang: "नोलपंग",
      mean_nolpang: "= 'खेल-पैंग': खेलने का समय बढ़ाओ!",
      desc_nolpang: "काम खत्म करो, फिर खुशी से खेलो",
      name_homework: "होमवर्क हेल्पर",
      desc_homework: "होमवर्क याद रखने में मदद करता है",
      name_shipdae: "बोलो, हम साथ हैं!",
      desc_shipdae: "बोलते समय घबराहट होने पर हिम्मत देता है",
      open: "खोलें",
      back: "होम"
    }
  };

  const LANG_KEY = 'dbfi_lang';          // 허브·모든 앱이 공유하는 언어 저장 키
  const SUPPORTED_LANGS = ['ko', 'en', 'hi'];

  function readStoredLang() {
    try {
      const saved = localStorage.getItem(LANG_KEY);
      if (saved && SUPPORTED_LANGS.includes(saved)) return saved;
    } catch (e) { /* localStorage 차단 환경 무시 */ }
    return 'hi';
  }

  let currentLang = readStoredLang();
  let currentAppKey = null;
  let currentAppUrl = null;

  function setLang(lang) {
    currentLang = lang;
    document.documentElement.lang = lang;
    try { localStorage.setItem(LANG_KEY, lang); } catch (e) { /* 무시 */ }
    const t = translations[lang];

    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (t[key]) el.textContent = t[key];
    });

    ['ko','en','hi'].forEach(l => {
      document.getElementById('langBtn-' + l).classList.toggle('active', l === lang);
    });

    if (currentAppKey) {
      document.getElementById('currentAppName').textContent = t['name_' + currentAppKey];
    }
  }

  function openApp(url, appKey) {
    currentAppKey = appKey;
    currentAppUrl = url + '?lang=' + encodeURIComponent(currentLang);
    document.getElementById('appFrame').src = currentAppUrl;
    document.getElementById('currentAppName').textContent = translations[currentLang]['name_' + appKey];
    document.getElementById('hubView').style.display = 'none';
    document.getElementById('appView').style.display = 'flex';
    window.scrollTo(0, 0);
  }

  function closeApp() {
    document.getElementById('appView').style.display = 'none';
    document.getElementById('hubView').style.display = 'flex';
    document.getElementById('appFrame').src = 'about:blank';
    currentAppKey = null;
    currentAppUrl = null;
    const stored = readStoredLang();
    if (stored !== currentLang) setLang(stored);
  }

  window.onload = () => setLang(currentLang);
</script>

</body>
</html>
