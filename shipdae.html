<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>शिपडे (ShipDae) - Confidence Helper</title>

    <!-- 폰트 불러오기 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans:wght@400;500;700;800&family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Noto Sans', 'Noto Sans Devanagari', sans-serif;
            background-color: #FFFFFF;
            color: #333333;
            overflow-x: hidden;
        }

        h1, h2, .title-font {
            font-family: 'Black Han Sans', 'Noto Sans Devanagari', sans-serif;
            font-weight: 400;
        }

        /* 메인 컬러 설정 */
        .bg-primary { background-color: #A0D8EF; }
        .text-primary { color: #A0D8EF; }
        .border-primary { border-color: #A0D8EF; }
        .hover-bg-primary-dark:hover { background-color: #85C7E6; }

        /* 애니메이션 효과 */
        .bounce-soft { animation: bounce-soft 2s infinite ease-in-out; }
        @keyframes bounce-soft {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 화면 전환용 클래스 */
        .screen { display: none; }
        .screen.active { display: block; }

        /* 모바일: 전체 화면 / 데스크톱: 폰 크기 중앙 프레임 */
        html {
            background: linear-gradient(160deg, #EAF6FC 0%, #F1F3F6 50%, #FFF7E6 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        body { width: 100%; max-width: 480px; margin: 0 auto; }
        @media (min-width: 540px) {
            body {
                height: calc(100vh - 48px);
                min-height: calc(100vh - 48px) !important;
                margin: 24px auto;
                border-radius: 32px;
                overflow: hidden;
                box-shadow: 0 24px 70px rgba(0, 40, 90, 0.18);
            }
            main { overflow-y: auto; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 네비게이션 및 상단 바 -->
    <header class="bg-primary text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center rounded-b-3xl">
        <div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')" tabindex="0" aria-label="Home" onkeydown="if(event.key==='Enter') navigate('home')">
            <span class="text-2xl">🌱</span>
            <h1 class="text-2xl tracking-wide" id="ui-title">शिपडे</h1>
        </div>

        <!-- 언어 선택 -->
        <select id="langSelect" onchange="changeLanguage()" class="bg-white text-gray-800 rounded-full px-3 py-1 text-sm font-sans focus:outline-none focus:ring-2 focus:ring-white">
            <option value="ko">🇰🇷 Korean</option>
            <option value="en">🇺🇸 English</option>
            <option value="hi" selected>🇮🇳 हिन्दी</option>
        </select>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-grow p-4 flex flex-col items-center justify-center w-full relative">

        <!-- ================= 화면 1. 홈 화면 ================= -->
        <section id="screen-home" class="screen active text-center w-full fade-in">
            <div class="mb-8 bounce-soft">
                <span class="text-7xl">🐻‍❄️</span>
            </div>
            <h2 class="text-3xl mb-2 text-gray-700" id="ui-welcome">नमस्ते! मैं आपका दोस्त शिपडे हूँ।</h2>
            <p class="text-gray-500 mb-8 text-lg" id="ui-desc">जब आपको बोलने में घबराहट हो, तो मैं आपकी मदद करूँगा!</p>

            <div class="flex flex-col gap-4 w-full px-4">
                <button onclick="navigate('feedback')" class="bg-primary hover-bg-primary-dark text-white rounded-2xl p-5 text-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95 flex items-center justify-between">
                    <span class="flex items-center gap-3">
                        <span class="text-2xl">🎤</span>
                        <span id="ui-btn-feedback">बोलने के टिप्स लें</span>
                    </span>
                    <span class="opacity-70">›</span>
                </button>

                <button onclick="navigate('advice')" class="bg-yellow-100 hover:bg-yellow-200 text-yellow-700 rounded-2xl p-5 text-xl shadow-lg transition-transform transform hover:scale-105 active:scale-95 flex items-center justify-between border-2 border-yellow-300">
                    <span class="flex items-center gap-3">
                        <span class="text-2xl">💛</span>
                        <span id="ui-btn-advice">प्रोत्साहक शब्द सुनें</span>
                    </span>
                    <span class="opacity-70">›</span>
                </button>
            </div>
        </section>


        <!-- ================= 화면 2. 말하기 팁 화면 ================= -->
        <section id="screen-feedback" class="screen w-full fade-in text-center">
            <button onclick="navigate('home')" class="absolute top-0 left-4 text-gray-400 hover:text-gray-600 flex items-center gap-2">
                ← <span id="ui-back-1">पीछे</span>
            </button>

            <div class="mt-10 mb-4">
                <span class="text-6xl">🗣️</span>
            </div>
            <h2 class="text-2xl mb-6 text-gray-700" id="ui-feedback-title">बोलने का आसान तरीका</h2>

            <button onclick="getTip()" class="bg-primary hover-bg-primary-dark text-white rounded-full py-4 px-8 text-2xl shadow-md transition-transform transform hover:scale-105 w-full font-bold" id="ui-btn-get-feedback">
                एक टिप पाएं 🔍
            </button>

            <!-- 결과 표시 영역 -->
            <div id="feedbackResultArea" class="mt-8 hidden bg-blue-50 border-2 border-blue-200 rounded-2xl p-6 text-left relative">
                <div id="feedbackContent" class="text-gray-700 text-lg leading-relaxed"></div>
            </div>
        </section>


        <!-- ================= 화면 3. 응원 화면 ================= -->
        <section id="screen-advice" class="screen w-full fade-in text-center">
            <button onclick="navigate('home')" class="absolute top-0 left-4 text-gray-400 hover:text-gray-600 flex items-center gap-2">
                ← <span id="ui-back-2">पीछे</span>
            </button>

            <div class="mt-10 mb-6 bounce-soft">
                <span class="text-6xl">✨</span>
            </div>
            <h2 class="text-2xl mb-6 text-gray-700 leading-snug" id="ui-advice-title">घबराहट हो रही है?<br>मैं आपको हिम्मत दूँगा!</h2>

            <button onclick="getAdvice()" class="bg-yellow-300 hover:bg-yellow-400 text-yellow-800 rounded-full py-4 px-8 text-2xl shadow-lg transition-transform transform hover:scale-105 w-full font-bold shadow-yellow-200" id="ui-btn-get-advice">
                एक जादुई मंत्र सुनें 🪄
            </button>

            <!-- 결과 표시 영역 -->
            <div id="adviceResultArea" class="mt-8 hidden bg-yellow-50 border-2 border-yellow-200 rounded-2xl p-6">
                <div id="adviceContent" class="text-gray-800 text-xl leading-relaxed font-bold break-keep"></div>
            </div>
        </section>

    </main>

    <footer class="text-center p-4 text-gray-400 text-sm">
        &copy; 2026 ShipDae App
    </footer>

    <!-- JavaScript 로직 -->
    <script>
        // ==========================================
        // 1. 다국어 (I18N) 데이터 (오프라인·인터넷 없이 동작)
        // ==========================================
        const translations = {
            ko: {
                title: "쉽대",
                welcome: "안녕! 난 네 친구 쉽대야.",
                desc: "남들 앞에서 말하기 떨릴 때, 내가 도와줄게!",
                btnFeedback: "말하기 팁 받기",
                btnAdvice: "응원 한마디 듣기",
                back: "뒤로",
                feedbackTitle: "쉽게 말하는 방법",
                adviceTitle: "많이 떨리나요?<br>제가 힘을 줄게요!",
                btnGetFeedback: "팁 하나 받기 🔍",
                btnGetAdvice: "마법 주문 듣기 🪄",
                tips: [
                    "🌟 시작 전에 숨을 크게 한 번 쉬고, 천천히 또박또박 말해봐요.",
                    "😊 친구 한 명의 눈을 보고 웃으면서 말하면 훨씬 편해져요.",
                    "🐢 급하지 않아도 돼요. 한 문장씩 천천히 말해요.",
                    "👐 손은 편하게 두고, 어깨를 펴면 목소리가 더 잘 나와요.",
                ],
                advices: [
                    "나는 할 수 있어! 틀려도 괜찮아. 🪄",
                    "한 문장씩 말하면 모두가 내 이야기를 들어줄 거야! ✨",
                    "떨리는 건 잘하고 싶은 마음이야. 넌 이미 멋져! 💛",
                    "천천히, 크게, 웃으며! 넌 최고야! 🌈",
                ]
            },
            en: {
                title: "ShipDae",
                welcome: "Hi! I'm your friend, ShipDae.",
                desc: "I'll help you when you feel nervous speaking in front of others!",
                btnFeedback: "Get Speaking Tips",
                btnAdvice: "Hear Cheering Words",
                back: "Back",
                feedbackTitle: "An easy way to speak",
                adviceTitle: "Feeling nervous?<br>Let me give you strength!",
                btnGetFeedback: "Get a tip 🔍",
                btnGetAdvice: "Hear a magic spell 🪄",
                tips: [
                    "🌟 Take one big breath first, then speak slowly and clearly.",
                    "😊 Look at one friend and smile while you talk — it feels easier.",
                    "🐢 No rush. Say one sentence at a time.",
                    "👐 Relax your hands and open your shoulders for a stronger voice.",
                ],
                advices: [
                    "I can do this! Mistakes are okay. 🪄",
                    "One sentence at a time, my story will be heard! ✨",
                    "Feeling nervous means you care. You're already great! 💛",
                    "Slow, loud, and smiling! You're the best! 🌈",
                ]
            },
            hi: {
                title: "शिपडे",
                welcome: "नमस्ते! मैं आपका दोस्त शिपडे हूँ।",
                desc: "जब आपको बोलने में घबराहट हो, तो मैं आपकी मदद करूँगा!",
                btnFeedback: "बोलने के टिप्स लें",
                btnAdvice: "प्रोत्साहक शब्द सुनें",
                back: "पीछे",
                feedbackTitle: "बोलने का आसान तरीका",
                adviceTitle: "घबराहट हो रही है?<br>मैं आपको हिम्मत दूँगा!",
                btnGetFeedback: "एक टिप पाएं 🔍",
                btnGetAdvice: "जादुई मंत्र सुनें 🪄",
                tips: [
                    "🌟 शुरू करने से पहले एक गहरी सांस लें, फिर धीरे और साफ बोलें।",
                    "😊 एक दोस्त की आँखों में देखकर मुस्कुराते हुए बोलें — आसान लगेगा।",
                    "🐢 जल्दी मत करो। एक-एक वाक्य धीरे बोलो।",
                    "👐 हाथ आराम से रखें और कंधे सीधे करें, आवाज़ अच्छी निकलेगी।",
                ],
                advices: [
                    "मैं कर सकता/सकती हूँ! गलती हो तो भी ठीक है। 🪄",
                    "एक-एक वाक्य बोलूंगा/बोलूंगी और सब मेरी बात सुनेंगे! ✨",
                    "घबराहट का मतलब है तुम्हें परवाह है। तुम पहले से शानदार हो! 💛",
                    "धीरे, ज़ोर से, मुस्कुराते हुए! तुम सबसे अच्छे हो! 🌈",
                ]
            }
        };

        // 허브·다른 앱과 언어를 공유하기 위한 헬퍼
        const LANG_KEY = 'dbfi_lang';
        const SUPPORTED_LANGS = ['ko', 'en', 'hi'];
        function getInitialLang() {
            try {
                const p = new URLSearchParams(location.search).get('lang');
                if (p && SUPPORTED_LANGS.includes(p)) return p;
            } catch (e) { /* 무시 */ }
            try {
                const s = localStorage.getItem(LANG_KEY);
                if (s && SUPPORTED_LANGS.includes(s)) return s;
            } catch (e) { /* 무시 */ }
            return 'hi';
        }

        let currentLang = 'hi';

        // ==========================================
        // 2. 초기화 및 UI 제어
        // ==========================================
        function changeLanguage() {
            currentLang = document.getElementById('langSelect').value;
            document.documentElement.lang = currentLang;
            try { localStorage.setItem(LANG_KEY, currentLang); } catch (e) { /* 무시 */ }
            const t = translations[currentLang];

            document.getElementById('ui-title').innerText = t.title;
            document.getElementById('ui-welcome').innerText = t.welcome;
            document.getElementById('ui-desc').innerText = t.desc;
            document.getElementById('ui-btn-feedback').innerText = t.btnFeedback;
            document.getElementById('ui-btn-advice').innerText = t.btnAdvice;
            document.getElementById('ui-back-1').innerText = t.back;
            document.getElementById('ui-back-2').innerText = t.back;
            document.getElementById('ui-feedback-title').innerText = t.feedbackTitle;
            document.getElementById('ui-btn-get-feedback').innerText = t.btnGetFeedback;
            document.getElementById('ui-advice-title').innerHTML = t.adviceTitle; // <br> 처리
            document.getElementById('ui-btn-get-advice').innerText = t.btnGetAdvice;
        }

        // 화면 네비게이션 함수
        function navigate(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen-${screenId}`).classList.add('active');
            if (screenId === 'home') {
                document.getElementById('feedbackResultArea').classList.add('hidden');
                document.getElementById('adviceResultArea').classList.add('hidden');
            }
        }

        // 배열에서 무작위 항목 하나 뽑기
        function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // 기능 1: 말하기 팁 (인터넷 없이 준비된 팁 중 하나)
        function getTip() {
            const area = document.getElementById('feedbackResultArea');
            const content = document.getElementById('feedbackContent');
            content.innerText = pickRandom(translations[currentLang].tips);
            area.classList.remove('hidden');
            content.classList.remove('fade-in');
            void content.offsetWidth;
            content.classList.add('fade-in');
        }

        // 기능 2: 응원 한마디 (인터넷 없이 준비된 응원 중 하나)
        function getAdvice() {
            const area = document.getElementById('adviceResultArea');
            const content = document.getElementById('adviceContent');
            content.innerText = pickRandom(translations[currentLang].advices);
            area.classList.remove('hidden');
            content.classList.remove('fade-in');
            void content.offsetWidth;
            content.classList.add('fade-in');
        }

        // 초기화 실행 (허브/저장값에서 이어받은 언어 적용)
        document.getElementById('langSelect').value = getInitialLang();
        changeLanguage();
    </script>
</body>
</html>
