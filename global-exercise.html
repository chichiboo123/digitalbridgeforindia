<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Exercise | ग्लोबल व्यायाम</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E%F0%9F%8F%83%3C/text%3E%3C/svg%3E">

    <!-- 폰트: 본문·타이틀 통합 Pretendard GOV (한국어·영문) + 힌디용 Noto Sans Devanagari -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-gov-dynamic-subset.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind 사용자 정의 색상 및 폰트 설정
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        fire: {
                            100: '#FFE4E6',
                            400: '#F43F5E',
                            500: '#EF4444',
                            600: '#E11D48',
                            700: '#F97316',
                            800: '#F59E0B',
                        }
                    },
                    fontFamily: {
                        title: ['"Pretendard GOV Variable"', '"Pretendard GOV"', '"Noto Sans Devanagari"', 'sans-serif'],
                        body: ['"Pretendard GOV Variable"', '"Pretendard GOV"', '"Noto Sans Devanagari"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Pretendard GOV Variable', 'Pretendard GOV', 'Noto Sans Devanagari', sans-serif;
            font-size: 18px;
            line-height: 1.5;
            -webkit-tap-highlight-color: transparent;
            /* 어절 단위 줄바꿈 */
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        /* Black Han Sans 자리를 대체한 타이틀은 Pretendard GOV 볼드로 표현 */
        .font-title { font-weight: 800; }

        /* 버튼 누를 때 귀여운 효과 */
        .btn-bounce { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-bounce:active { transform: scale(0.95); }

        /* 통통 튀는 애니메이션 */
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-bounce-slow { animation: bounce-slow 2s infinite ease-in-out; }

        /* 탭 숨김 처리용 클래스 */
        .screen-hidden { display: none !important; }

        /* 모바일: 전체 화면 / 데스크톱: 폰 크기 중앙 프레임 */
        .app-root { width: 100%; max-width: 480px; margin: 0 auto; }
        @media (min-width: 540px) {
            body { padding-top: 24px; padding-bottom: 24px; }
            .app-root {
                min-height: calc(100vh - 48px) !important;
                border-radius: 32px;
                overflow: hidden;
                box-shadow: 0 24px 70px rgba(0, 40, 90, 0.18);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-100 via-orange-100 to-red-100 min-h-screen text-gray-800 flex flex-col items-center">

    <!-- 모바일 화면 크기에 맞춘 메인 컨테이너 -->
    <div class="app-root w-full min-h-screen bg-white/60 relative flex flex-col">

        <!-- 헤더 영역 -->
        <header class="bg-fire-600 text-white p-4 rounded-b-3xl shadow-md flex justify-between items-center z-10">
            <button id="homeBtn" class="p-2 btn-bounce focus:outline-none focus:ring-4 focus:ring-fire-400 rounded-full" aria-label="Home" onclick="navigate('home')">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </button>
            <h1 class="font-title text-3xl tracking-wide flex-1 text-center" data-i18n="title">ग्लोबल व्यायाम</h1>

            <!-- 언어 선택 드롭다운 -->
            <select id="langSelect" class="bg-fire-800 text-white font-title text-xl rounded-lg p-1 border-2 border-white focus:outline-none" aria-label="Language select" onchange="changeLanguage(this.value)">
                <option value="ko">KR</option>
                <option value="en">EN</option>
                <option value="hi" selected>HI</option>
            </select>
        </header>

        <!-- 메인 콘텐츠 영역 (화면 전환) -->
        <main class="flex-1 p-6 overflow-y-auto" id="mainContent">

            <!-- 화면 1. 홈 화면 -->
            <section id="screen-home" class="flex flex-col gap-6 h-full justify-center">
                <p class="text-center text-fire-600 font-bold text-3xl" data-i18n="slogan">🔥 जुनून के साथ व्यायाम करें! 🔥</p>
                <div class="bg-white/80 border-2 border-fire-100 rounded-3xl p-4 text-center shadow-sm">
                    <p class="text-fire-700 font-bold text-2xl" data-i18n="home_guide">2 बड़े बटनों में से एक चुनें</p>
                </div>

                <div class="grid grid-cols-1 gap-5">
                    <!-- 기능 1. 추천 -->
                    <button onclick="navigate('recommend')" class="bg-fire-600 text-white rounded-3xl p-8 shadow-lg btn-bounce flex flex-col items-center gap-3 focus:ring-4 focus:ring-fire-800">
                        <span class="text-6xl">🎲</span>
                        <span class="font-bold text-3xl" data-i18n="menu_rec">आज क्या करें?</span>
                    </button>
                    <!-- 기능 2. 타이머 -->
                    <button onclick="navigate('timer')" class="bg-fire-700 text-white rounded-3xl p-8 shadow-lg btn-bounce flex flex-col items-center gap-3 focus:ring-4 focus:ring-fire-800">
                        <span class="text-6xl">⏱️</span>
                        <span class="font-bold text-3xl" data-i18n="menu_timer">टाइमर</span>
                    </button>
                </div>
            </section>

            <!-- 화면 2. 운동 추천 화면 -->
            <section id="screen-recommend" class="screen-hidden flex flex-col items-center justify-center h-full">
                <h2 class="font-title text-4xl text-fire-500 mb-2 text-center" data-i18n="menu_rec">आज क्या करें?</h2>
                <p class="text-center text-gray-600 leading-tight mb-8" data-i18n="desc_rec">बटन दबाएं और आज का व्यायाम पाएं!</p>

                <div id="recResult" class="w-full aspect-square md:aspect-[2/1] max-h-64 bg-white rounded-full shadow-2xl flex items-center justify-center mb-8 border-8 border-fire-400 transition-all duration-500 transform scale-90">
                    <p class="text-center text-gray-400 font-bold text-3xl px-6" data-i18n="rec_placeholder">?</p>
                </div>

                <button onclick="pickExercise()" class="w-full max-w-xs bg-fire-600 text-white font-bold py-4 rounded-full shadow-[0_8px_0_#9F1239] active:shadow-[0_0px_0_#9F1239] active:translate-y-2 transition-all text-4xl" data-i18n="btn_pick">
                    एक चुनें!
                </button>
            </section>

            <!-- 화면 3. 운동 타이머 화면 -->
            <section id="screen-timer" class="screen-hidden flex flex-col items-center h-full">
                <h2 class="font-title text-4xl text-fire-700 mb-2" data-i18n="menu_timer">टाइमर</h2>
                <p class="text-center text-gray-600 leading-tight mb-6" data-i18n="desc_timer">समय चुनें और 0 तक व्यायाम करें!</p>

                <!-- 빠른 선택 버튼 (숫자 입력 대신 한 번에 시작) -->
                <div class="grid grid-cols-3 gap-3 w-full mb-6">
                    <button onclick="quickStart(1)" class="bg-fire-100 text-fire-700 font-bold py-4 rounded-2xl shadow btn-bounce text-2xl">1<span data-i18n="unit_min">मिनट</span></button>
                    <button onclick="quickStart(3)" class="bg-fire-100 text-fire-700 font-bold py-4 rounded-2xl shadow btn-bounce text-2xl">3<span data-i18n="unit_min">मिनट</span></button>
                    <button onclick="quickStart(5)" class="bg-fire-100 text-fire-700 font-bold py-4 rounded-2xl shadow btn-bounce text-2xl">5<span data-i18n="unit_min">मिनट</span></button>
                </div>

                <div class="bg-white w-full rounded-3xl p-8 shadow-lg border-4 border-fire-500 flex flex-col items-center mb-8 relative overflow-hidden">
                    <div class="absolute -top-10 -left-10 w-32 h-32 bg-fire-100 rounded-full opacity-50"></div>
                    <div id="timeDisplay" class="font-title text-8xl text-fire-600 z-10 tracking-widest">00:00</div>
                </div>

                <div class="flex gap-4 w-full mt-auto">
                    <button id="startTimerBtn" onclick="toggleTimer()" class="flex-1 bg-fire-500 text-white font-bold py-4 rounded-2xl shadow-md btn-bounce text-3xl" data-i18n="btn_start">शुरू!</button>
                    <button onclick="resetTimer()" class="flex-1 bg-gray-400 text-white font-bold py-4 rounded-2xl shadow-md btn-bounce text-3xl" data-i18n="btn_reset">रीसेट</button>
                </div>
            </section>

        </main>
    </div>

    <!-- 어린이용 인앱 토스트 (딱딱한 alert 대체) -->
    <div id="appToast" role="status" aria-live="polite" class="screen-hidden fixed left-1/2 -translate-x-1/2 bottom-8 z-50 bg-white border-4 border-fire-400 text-fire-700 font-bold text-2xl px-6 py-4 rounded-3xl shadow-2xl text-center max-w-[90%]"></div>

    <!-- 스크립트: 앱 로직 및 다국어 처리 -->
    <script>
        // ==========================================
        // 1. 다국어 (I18N) 데이터 및 로직
        // ==========================================
        const translations = {
            ko: {
                title: "글로벌 운동",
                slogan: "🔥 신나게 운동하자! 🔥",
                home_guide: "큰 버튼 2개 중 하나를 고르세요",
                menu_timer: "운동 타이머",
                menu_rec: "오늘 뭐할까?",
                desc_timer: "시간을 고르고 0초가 될 때까지 운동해요!",
                unit_min: "분",
                btn_start: "시작!",
                btn_stop: "정지",
                btn_reset: "초기화",
                desc_rec: "버튼을 눌러 오늘의 운동을 받아요!",
                rec_placeholder: "버튼을 누르면 알려줄게요!",
                btn_pick: "하나 뽑기!",
                alert_timer_end: "타이머 종료! 운동 수고했어요! 🎉",
                ex_1: "💪 팔벌려뛰기 20회",
                ex_2: "🏃 제자리 걷기 5분",
                ex_3: "🧘 고양이 자세 스트레칭",
                ex_4: "🤸 신나는 노래에 맞춰 춤추기",
                ex_5: "🪜 계단 오르기",
            },
            en: {
                title: "Global Exercise",
                slogan: "🔥 Let's Exercise! 🔥",
                home_guide: "Choose one of the 2 big buttons",
                menu_timer: "Timer",
                menu_rec: "What to do today?",
                desc_timer: "Pick a time and exercise until 0!",
                unit_min: "min",
                btn_start: "Start!",
                btn_stop: "Stop",
                btn_reset: "Reset",
                desc_rec: "Press the button for today's exercise!",
                rec_placeholder: "Click the button to find out!",
                btn_pick: "Pick one!",
                alert_timer_end: "Time's up! Great job! 🎉",
                ex_1: "💪 20 Jumping Jacks",
                ex_2: "🏃 Walk in place (5 mins)",
                ex_3: "🧘 Cat-cow stretching",
                ex_4: "🤸 Dance to a fun song",
                ex_5: "🪜 Climb some stairs",
            },
            hi: {
                title: "ग्लोबल व्यायाम",
                slogan: "🔥 चलो व्यायाम करें! 🔥",
                home_guide: "2 बड़े बटनों में से एक चुनें",
                menu_timer: "टाइमर",
                menu_rec: "आज क्या करें?",
                desc_timer: "समय चुनें और 0 तक व्यायाम करें!",
                unit_min: "मिनट",
                btn_start: "शुरू!",
                btn_stop: "रुकें",
                btn_reset: "रीसेट",
                desc_rec: "बटन दबाएं और आज का व्यायाम पाएं!",
                rec_placeholder: "जानने के लिए बटन पर क्लिक करें!",
                btn_pick: "एक चुनें!",
                alert_timer_end: "समय समाप्त! बहुत बढ़िया! 🎉",
                ex_1: "💪 20 जंपिंग जैक",
                ex_2: "🏃 अपनी जगह पर चलें (5 मिनट)",
                ex_3: "🧘 स्ट्रेचिंग करें",
                ex_4: "🤸 मजेदार गाने पर डांस करें",
                ex_5: "🪜 सीढ़ियां चढ़ें",
            }
        };

        // 허브·다른 앱과 언어를 공유하기 위한 헬퍼
        const LANG_KEY = 'dbfi_lang';
        const SUPPORTED_LANGS = ['ko', 'en', 'hi'];
        function getInitialLang() {
            try {
                const p = new URLSearchParams(location.search).get('lang');
                if (p && SUPPORTED_LANGS.includes(p)) return p;
            } catch (e) { /* 무시 */ }
            try {
                const s = localStorage.getItem(LANG_KEY);
                if (s && SUPPORTED_LANGS.includes(s)) return s;
            } catch (e) { /* 무시 */ }
            return 'hi';
        }
        function persistLang(lang) { try { localStorage.setItem(LANG_KEY, lang); } catch (e) { /* 무시 */ } }

        let currentLang = 'hi';

        // 어린이용 인앱 알림 (네이티브 alert 대체)
        function showToast(msg) {
            const el = document.getElementById('appToast');
            el.textContent = msg;
            el.classList.remove('screen-hidden');
            clearTimeout(el._t);
            el._t = setTimeout(() => el.classList.add('screen-hidden'), 2800);
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            persistLang(lang);
            const sel = document.getElementById('langSelect');
            if (sel && sel.value !== lang) sel.value = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang][key]) el.textContent = translations[lang][key];
            });
            // 시작/정지 버튼 라벨을 현재 상태에 맞게 유지
            const btn = document.getElementById('startTimerBtn');
            if (btn) btn.textContent = isRunning ? translations[lang].btn_stop : translations[lang].btn_start;
        }

        // ==========================================
        // 2. 화면 네비게이션 로직
        // ==========================================
        function navigate(screenId) {
            ['home', 'timer', 'recommend'].forEach(s => {
                document.getElementById(`screen-${s}`).classList.add('screen-hidden');
            });
            document.getElementById(`screen-${screenId}`).classList.remove('screen-hidden');
        }

        // ==========================================
        // 3. 기능: 운동 추천
        // ==========================================
        function pickExercise() {
            const resultBox = document.getElementById('recResult');
            const exercises = ['ex_1', 'ex_2', 'ex_3', 'ex_4', 'ex_5'];

            resultBox.classList.remove('scale-100');
            resultBox.classList.add('scale-90', 'bg-gray-100');
            resultBox.innerHTML = `<p class="text-5xl animate-spin">⏳</p>`;

            setTimeout(() => {
                const randomKey = exercises[Math.floor(Math.random() * exercises.length)];
                const picked = translations[currentLang][randomKey];
                resultBox.classList.remove('scale-90', 'bg-gray-100');
                resultBox.classList.add('scale-100', 'bg-fire-100');
                resultBox.innerHTML = `<p class="text-center text-fire-700 font-bold text-4xl px-4 animate-bounce-slow">${picked}</p>`;
            }, 800);
        }

        // ==========================================
        // 4. 기능: 타이머 (숫자 입력 대신 빠른 선택 버튼)
        // ==========================================
        let timerInterval;
        let totalSeconds = 0;
        let isRunning = false;

        function updateTimerDisplay() {
            const m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            document.getElementById('timeDisplay').innerText = `${m}:${s}`;
        }

        function runTimer() {
            const btn = document.getElementById('startTimerBtn');
            isRunning = true;
            btn.innerText = translations[currentLang].btn_stop;
            btn.classList.replace('bg-fire-500', 'bg-fire-700');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                totalSeconds--;
                updateTimerDisplay();
                if (totalSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    btn.innerText = translations[currentLang].btn_start;
                    btn.classList.replace('bg-fire-700', 'bg-fire-500');
                    showToast(translations[currentLang].alert_timer_end);
                }
            }, 1000);
        }

        // 빠른 선택 버튼: 분을 정하고 곧바로 시작
        function quickStart(min) {
            totalSeconds = min * 60;
            updateTimerDisplay();
            runTimer();
        }

        // 시작/정지 토글
        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                const btn = document.getElementById('startTimerBtn');
                btn.innerText = translations[currentLang].btn_start;
                btn.classList.replace('bg-fire-700', 'bg-fire-500');
                return;
            }
            if (totalSeconds <= 0) totalSeconds = 60; // 아무것도 안 골랐으면 1분 기본
            runTimer();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = 0;
            updateTimerDisplay();
            const btn = document.getElementById('startTimerBtn');
            btn.innerText = translations[currentLang].btn_start;
            btn.classList.replace('bg-fire-700', 'bg-fire-500');
        }

        // ==========================================
        // 초기화 코드
        // ==========================================
        window.onload = () => {
            changeLanguage(getInitialLang());
            updateTimerDisplay();
            navigate('home');
        };
    </script>
</body>
</html>
